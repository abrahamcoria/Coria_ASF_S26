<body_2>
    <div class="header1">
        <img src="./images/pugspub.png" alt="Pugs Pub" height="400" width="400">
    </div>


    <div class="resForm">


    <form action = "text" method="post">
        <h1 class="resCaption">Reserve your Spot!</h1>
        <caption class="resCaption">Secure your stool in the steam —
            reserve now and join the wrinkled
            revolution at Pugs Pub. Requests are noted with care,
            but there's no guarantee of fulfillment due
            to high demand and limited brass perches</caption>
        <h2 class="resHead">Meal Type</h2>

        <label class="mealType" >
             <input type="radio" name="Meal"value="breakfast" checked>Breakfast
             <input type="radio" name="Meal"value="lunch">Lunch
             <input type="radio" name="Meal"value="dinner">Dinner
        </label>

        <label> First Name:   <input type="text", name="fname"required maxlength="20"> </label>
        <label> Last Name:   <input type="text", name="lname"required maxlength="20"> </label>
        <label> Email <input type="email" name="email" required> </label>
        <label> Party Size <input type="number" max="8" min="1"> </label>
        <label> Date <input type="date" name="date" required> </label>
        <label> Time <input type="time" name="time" required> </label>
        <label> Phone Number: <input type="tel", name="pnumber" required>  </label>
        <div class="seatingBox">
        <label class="seating" >
            <label>Seating:   </label>
            <input type="radio" name="seatingType"value="Indoor" checked>Indoor
             <input type="radio" name="seatingType"value="Outdoor">Outdoor
             <input type="radio" name="seatingType"value="Private Room">Private Room
        </label>
       </div>

        <label> Dietary Considerations? <input class="dietaryTextBox" type="text" name="Dietary Considerations" maxlength="30" > </label>

        <label> <input type="checkbox"> Would you like to Opt in for "Pugs Pub" newsletter? </label>

        <div class="buttonBox">
        <button class="buttons" type="submit">Submit</button>
        <button class="buttons" type="reset">Reset</button>
        </div>


    </div>



</body_2>
</html>
