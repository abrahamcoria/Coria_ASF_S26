<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pugs Pub Cart</title>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Metamorphous&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a20c66204e.js" crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet"  href="./styles.css">
  <link rel="stylesheet"  href="styles.css">

</head>
<body class="bg-dark text-light">
<div class="fixed-bg"></div>
<div class="content-wrapper position-relative">
  <nav class="navbar navbar-expand-lg fixed-top navbar-dark">
    <div class="container-fluid">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#navbarNav" aria-controls="navbarNav"
              aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse d-lg-flex justify-content-lg-center" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="index.html"><i class="fa-regular fa-house"></i>Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="menu.html"><i class="fa-solid fa-book-open"></i>Menu / Order-To-Go</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="reservations.html"><i class="fa-regular fa-calendar-check"></i>Reservations</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="cart.html"><i class="fa-solid fa-cart-shopping"></i>Cart</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
<div class="video-background-holder-2">
  <video
          class="video-background-video-2"
          autoplay
          muted
          loop
          playsinline
          preload="auto"
  >
    <source src="./Video/altBackground.mp4" type="video/mp4">
    <img src="./images/poster-frame.jpg" alt="Background fallback">
    Your browser does not support the video tag.
  </video>
</div>

  <div class="p-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
      <h1 class="fw-bold mb-0">To-Go Cart</h1>
      <h6 id="cart-items-count" class="mb-0 text-muted">0 items</h6>
    </div>
    <hr class="my-4">

  <div id="cart-items"></div>
    <div class="d-flex justify-content-between mb-3">
      <strong>Subtotal</strong>
      <span id="subtotal">$0.00</span>
    </div>
    <div class="d-flex justify-content-between mb-3">
      <strong>Tax</strong>
      <span id="tax">$0.00</span>
    </div>
    <hr>
    <div class="d-flex justify-content-between mb-4">
      <strong>Total <br><small>(including tax)</small></strong>
      <span id="total" class="fs-4 fw-bold">$0.00</span>
    </div>

    <div class="mt-4 text-center">
      <button id="btn-clear-cart" class="btn btn-danger">
        Clear Cart
      </button>
      <button id="btn-checkout" class="btn btn-success ms-2">
        Checkout
      </button>
    </div>

  </div>

  <script src="./script.js"></script>

</body>
</html>
