<body_2>
    <nav class="navbar navbar-expand-lg fixed-top navbar-dark">
        <div class="container-fluid">

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav" aria-controls="navbarNav"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse d-lg-flex justify-content-lg-center" id="navbarNav">

    <div class="video-background-holder-2">
        <video
                class="video-background-video-2"
                autoplay
                muted
                loop
                playsinline
                preload="auto"
        >
            <source src="./Video/altBackground.mp4" type="video/mp4">

            <img src="./images/background.png" alt="Background fallback">
            Your browser does not support the video tag.
        </video>
    </div>
    <div class="header1">
        <img src="./images/pugspub.png" alt="Pugs Pub" height="400" width="400">
    </div>
    <div class="resForm">
        <h1 class="resCaption text-center mb-4">Reserve your Spot!</h1>
        <p class="resCaption text-center lead mb-5">
            Secure your stool in the steam — reserve now and join the
            wrinkled revolution at Pugs Pub.<br>
            Requests are noted with care, but there's
            no guarantee of fulfillment due to high demand and
            limited brass perches.
        </p>

        <form id="reservationForm" action="#" method="post" novalidate>

            <h2 class="resHead mb-3">Meal Type</h2>
            <div class="d-flex flex-wrap gap-4 mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="Meal" id="breakfast" value="breakfast" checked>
                    <label class="form-check-label" for="breakfast">Breakfast</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="Meal" id="lunch" value="lunch">
                    <label class="form-check-label" for="lunch">Lunch</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="Meal" id="dinner" value="dinner">
                    <label class="form-check-label" for="dinner">Dinner</label>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-md-6">
                    <label for="fname" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="fname" name="fname" required maxlength="20">
                </div>
                <div class="col-md-6">
                    <label for="lname" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="lname" name="lname" required maxlength="20">
                </div>
                <div class="col-12">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="enter@email.com" required>
                </div>
                <div class="col-md-4">
                    <label for="partySize" class="form-label">Party Size</label>
                    <input type="number" class="form-control" id="partySize" name="partySize" min="1" max="8" value="2">
                </div>
                <div class="col-md-4">
                    <label for="date" class="form-label">Date</label>
                    <input type="date" class="form-control" id="date" name="date" required>
                </div>
                <div class="col-md-4">
                    <label for="time" class="form-label">Time</label>
                    <input type="time" class="form-control" id="time" name="time" required>
                </div>
                <div class="col-12">
                    <label for="pnumber" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="pnumber" name="pnumber" required>
                </div>
            </div>

            <h2 class="resHead mt-4 mb-3">Seating</h2>
            <div class="d-flex flex-wrap gap-4 mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="seating" id="indoor" value="Indoor" checked>
                    <label class="form-check-label" for="indoor">Indoor</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="seating" id="outdoor" value="Outdoor">
                    <label class="form-check-label" for="outdoor">Outdoor</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="seating" id="private" value="Private Room">
                    <label class="form-check-label" for="private">Private Room</label>
                </div>
            </div>

            <div class="mb-4">
                <label for="dietary" class="form-label">Dietary Considerations?</label>
                <input type="text" class="form-control" id="dietary" name="Dietary Considerations" maxlength="30">
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="newsletter" name="newsletter">
                <label class="form-check-label" for="newsletter">Would you like to Opt in for "Pugs Pub" newsletter?</label>
            </div>

            <div id="formFeedback" class="mt-4"></div>

            <div class="text-center">
                <button class="buttons btn btn-lg px-5 me-3" type="submit">Submit</button>
                <button class="buttons btn btn-lg px-5" type="reset">Reset</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="script.js"> </script>

</body_2>
</html>
